name: Lark Daily Reminder

on:
  schedule:
    - cron: '30 6 * * 1-5'   
    - cron: '0 8 * * 1-5'   
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send reminder
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: python send_reminder.py
